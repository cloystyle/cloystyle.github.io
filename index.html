<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue1:#00c6ff;
  --blue2:#0072ff;
}

*{box-sizing:border-box}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* FONDO ANIMADO SUAVE */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,198,255,0.15), transparent 60%),
                radial-gradient(circle, rgba(0,114,255,0.1), transparent 70%);
    animation: moveBg 15s linear infinite;
    z-index: -1;
}

@keyframes moveBg {
    0% { transform: translate(0,0); }
    50% { transform: translate(-10%, -10%); }
    100% { transform: translate(0,0); }
}

.container {
    text-align: center;
    padding: 40px 20px;
    max-width: 700px;
    margin: auto;
}

h1 {
    font-size: 3em;
    margin-bottom: 10px;
    text-shadow: 0 0 10px var(--blue1), 0 0 30px var(--blue2);
}

.subtitle {
    opacity: 0.7;
    margin-bottom: 40px;
}

/* BOTONES MÁS COMPACTOS Y FINOS */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.btn {
    width: 100%;
    height: 55px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    color: white;
    font-size: 1em;
    text-align: left;
    padding-left: 20px;
    background: linear-gradient(135deg, rgba(0,198,255,0.12), rgba(0,114,255,0.12));
    backdrop-filter: blur(8px);
    box-shadow: 0 0 10px rgba(0,198,255,0.3);
    transition: 0.25s;
    position: relative;
}

.btn::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:14px;
    border:1px solid rgba(0,198,255,0.3);
}

.btn:hover {
    transform: scale(1.02);
    box-shadow: 0 0 20px rgba(0,198,255,0.7);
}

/* MODAL GRANDE */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.3s ease;
}

.modal-content {
    width: 95%;
    height: 90%;
    background: linear-gradient(180deg, #020b12, #000);
    border-radius: 25px;
    padding: 25px;
    box-shadow: 0 0 40px rgba(0,198,255,0.8);
    display: flex;
    flex-direction: column;
    animation: zoomIn 0.3s ease;
}

.modalText {
    flex: 1;
    overflow-y: auto;
    padding-right: 10px;
    line-height: 1.6;
}

.modalText::-webkit-scrollbar{
    width:6px;
}
.modalText::-webkit-scrollbar-thumb{
    background:var(--blue2);
    border-radius:10px;
}

.close-btn {
    margin-top: 15px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(135deg, var(--blue1), var(--blue2));
    color: white;
    font-size:1em;
    cursor: pointer;
    box-shadow:0 0 15px var(--blue1);
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes zoomIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

</style>
</head>
<body>

<div class="container">
    <h1>Cloy-Style</h1>
    <div class="subtitle">Bypass School</div>

    <div class="buttons">
        <button class="btn" onclick="openModal(1)">Tareas</button>
        <button class="btn" onclick="openModal(2)">Pruebas para Examen</button>
        <button class="btn" onclick="openModal(3)">Metodos</button>
        <button class="btn" onclick="openModal(4)">Pronto</button>
        <button class="btn" onclick="openModal(5)">Pronto</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div id="modalText" class="modalText">Aquí va tu información...</div>
        <button class="close-btn" onclick="closeModal()">Volver</button>
    </div>
</div>

<script>
const texts = {
    1: "No hay tareas por ahora.",
    2: "Prueba: Ciencias <br><br><a href='https://google.com' target='_blank'>Prueba de Ciencias</a>",
    3: "No hay tareas por ahora.",
    4: "No hay tareas por ahora.",
    5: "No hay tareas por ahora."
};

function openModal(num) {
    document.getElementById("modalText").innerHTML = texts[num];
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
