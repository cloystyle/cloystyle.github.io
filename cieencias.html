<style>
:root {
    --bg: #0f1115;
    --panel: #181b22;
    --soft: #222631;
    --accent: #7c5cff;
    --text: #e4e6eb;
    --subtext: #9aa0a6;
    --correct: #22c55e;
    --wrong: #ef4444;
    --border: #2a2f3a;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #141821, #0f1115);
    color: var(--text);
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 30px;
}

.tabs {
    display: flex;
    gap: 10px;
    margin: 20px 0;
}

.tab-button {
    background: var(--soft);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
}

.tab-button.active {
    background: var(--accent);
}

.content {
    display: none;
}

.content.active {
    display: block;
}

.progress-container {
    background: var(--soft);
    height: 10px;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 20px;
}

.progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: 0.4s;
}

.question {
    font-size: 1.3em;
    margin-bottom: 20px;
}

.options {
    display: grid;
    gap: 10px;
}

.option {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 14px;
    border-radius: 8px;
    cursor: pointer;
}

.option:hover {
    border-color: var(--accent);
}

.feedback {
    display: none;
    margin-top: 20px;
    background: var(--panel);
    padding: 20px;
    border-radius: 10px;
}

.next-btn {
    margin-top: 15px;
    background: var(--accent);
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

#results-container {
    display: none;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">
    <h1>Prueba de Ciencias</h1>

    <div class="tabs">
        <button class="tab-button active" onclick="showContent('quiz')">Prueba</button>
    </div>

    <div id="quiz" class="content active">

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div id="quiz-container">
            <p class="question" id="question-text"></p>
            <div class="options" id="options-container"></div>

            <div class="feedback" id="feedback-panel">
                <div id="feedback-status"></div>
                <button class="next-btn" onclick="handleNext()">Continuar</button>
            </div>
        </div>

        <div id="results-container">

            <p id="final-score"></p>

            <button class="next-btn" onclick="resetQuiz(); showQuestion();">

        </div>

    </div>
</div>

const questions = originalQuestions.map(q => ({
    q: q.pregunta,
    options: q.opciones,
    answer: q.respuesta_correcta
}));

function showContent(tab) {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.getElementById(tab).classList.add('active');

    resetQuiz();
    showQuestion();
}

function showQuestion() {
    const q = questions[current];
    document.getElementById("question-text").textContent = q.q;

    const container = document.getElementById("options-container");
    container.innerHTML = "";

    q.options.forEach(opt => {
        const div = document.createElement("div");
        div.className = "option";
        div.textContent = opt;
        div.onclick = () => check(opt, div);
        container.appendChild(div);
    });

    updateProgress();
}

function check(selected, element) {
    const q = questions[current];

    document.querySelectorAll(".option").forEach(o => o.onclick = null);

    const feedback = document.getElementById("feedback-panel");
    const status = document.getElementById("feedback-status");

    feedback.style.display = "block";

    if (selected === q.answer) {
        status.textContent = "Correcto";
        status.style.color = "#22c55e";
        correct++;
    } else {
        status.textContent = "Incorrecto";
        status.style.color = "#ef4444";
    }
}

function handleNext() {
    current++;
    document.getElementById("feedback-panel").style.display = "none";

    if (current < questions.length) {
        showQuestion();
    } else {
        showResults();
    }
}

function updateProgress() {
    const progress = (current / questions.length) * 100;
    document.getElementById("progress-bar").style.width = progress + "%";
}

function showResults() {
    document.getElementById("quiz-container").style.display = "none";
    document.getElementById("results-container").style.display = "block";

    document.getElementById("final-score").textContent =
        "Puntaje: " + Math.round((correct / questions.length) * 100) + "%";
}

function resetQuiz() {
    current = 0;
    correct = 0;

    document.getElementById("progress-bar").style.width = "0%";
    document.getElementById("quiz-container").style.display = "block";
    document.getElementById("results-container").style.display = "none";
}

window.onload = () => {
    resetQuiz();
    showQuestion();
};
